# Printer Dashboard Configuration
# Copy this to config.yaml and fill in your printer details.

listen: ":8080"

# Dashboard web authentication (for remote access)
auth:
  enabled: true
  username: admin
  password: "$2a$10$..."  # bcrypt hash — generate with: htpasswd -bnBC 10 "" yourpassword | tr -d ':\n'
  secret: "change-me-to-a-random-secret"

# Bambu Lab cloud account (required for Bambu printers)
# No LAN mode or developer mode needed — works with standard cloud-connected printers.
#
# TOKEN ACQUISITION (recommended for SSO users):
#   If you sign in with Google/Apple SSO, the email/password login won't work.
#   Use the bambu-login CLI tool (option 2) for step-by-step browser token extraction:
#
#     1. Open https://bambulab.com/en/sign-in → Sign in with Google
#     2. DevTools → Console → object.keys(localStorage)
#     3. Find the key with value starting with 'eyJ' (JWT token)
#     4. Run: bambu-login (select option 2) → paste the token
#
#   The token is saved to ~/.printer-dashboard/ and auto-loaded on server restart.
#   Token lasts ~3 months; you only need to re-extract when it expires.
#
# EXAMPLE CONFIGURATIONS:
#
#   Option A: Email/password login (auto 2FA handling):
#   bambu_account:
#     email: "your-bambu-email@example.com"
#     password: "your-bambu-password"
#     region: "global"
#
#   Option B: Pre-obtained JWT token (for SSO users):
#   bambu_account:
#     user_id: "123456789"
#     token: "eyJhbGciOiJSUzI1NiIs..."
#     region: "global"
#
#   Option C: Token saved by bambu-login (simplest — no token in config.yaml):
#   bambu_account:
#     user_id: "123456789"
#     region: "global"
#
#   The token file at ~/.printer-dashboard/bambu_token_*.json is loaded automatically.
bambu_account:
  email: ""
  password: ""
  # user_id: ""
  # token: ""
  region: "global"  # "global" or "china"

printers:
  # Bambu printers use cloud MQTT — no host/port needed.
  # host + access_code are optional and used only for local camera access.
  - id: p1s
    name: "Bambu P1S"
    type: bambu
    # model: P1S            # optional — when set, enables model-specific camera support
    serial: "SERIAL000000000001"    # dev_id from Bambu Cloud / printer label
    host: 192.168.1.100             # LAN IP (for camera, optional)
    access_code: "12345678"         # from printer screen (for camera, optional)

  - id: h2s
    name: "Bambu H2S"
    type: bambu
    model: H2S              # optional, enables H2S multi-camera + RTSPS
    serial: "SERIAL000000000002"
    host: 192.168.1.101
    access_code: "12345678"

  - id: u1
    name: "Snapmaker U1"
    type: snapmaker
    host: 192.168.1.102
    port: 8080
    access_code: ""  # API key if required

cameras:
  - id: cam-p1s-ext
    name: "P1S Exterior Camera"
    url: "rtsp://192.168.1.200:554/stream"
    printer_id: p1s

  - id: cam-h2s-ext
    name: "H2S Exterior Camera"
    url: "rtsp://192.168.1.201:554/stream"
    printer_id: h2s
